name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card (dark-mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=dark&custom_title=My%20GitHub%20Stats&card_width=445
          path: profile/stats-dark.svg
          token: ${{ secrets.PAT }}

      - name: Generate stats card (light-mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=light&custom_title=My%20GitHub%20Stats&card_width=445
          path: profile/stats-light.svg
          token: ${{ secrets.PAT }}

      - name: Generate top languages card (dark-mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide=CSS&theme=dark&show_icons=true&count_private=true&card_width=445
          path: profile/top-langs-dark.svg
          token: ${{ secrets.PAT }}

      - name: Generate top languages card (light-mode)
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide=CSS&theme=light&show_icons=true&count_private=true&card_width=445
          path: profile/top-langs-light.svg
          token: ${{ secrets.PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
